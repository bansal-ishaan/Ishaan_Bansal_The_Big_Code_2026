<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Synapse</title>
    <link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fdfdfd;
            --surface: #f3f4f6;
            --text-primary: #1f2937;
            --text-secondary: #4b5563;
            --accent: #3b82f6;
            --border: #e5e7eb;
            --radius: 8px;
        }

        body {
            font-family: 'Atkinson Hyperlegible', sans-serif;
            width: 260px; /* More compact width */
            margin: 0;
            padding: 0;
            background: var(--bg);
            color: var(--text-primary);
            font-size: 14px; /* Tighter font size */
            line-height: 1.4;
            overflow: hidden;
        }

        .container {
            padding: 12px 16px; /* Compact padding */
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding-bottom: 2px;
        }

        .logo { font-size: 16px; }

        .title {
            font-size: 15px;
            font-weight: 700;
            color: var(--text-primary);
        }

        /* Tighter Segmented Control */
        .tabs {
            display: flex;
            background: var(--surface);
            padding: 3px;
            border-radius: 6px;
            border: 1px solid var(--border);
        }

        .tab {
            flex: 1;
            padding: 4px 0;
            border: none;
            background: transparent;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            transition: all 0.15s ease;
        }

        .tab.active {
            background: white;
            color: var(--text-primary);
            box-shadow: 0 1px 2px rgba(0,0,0,0.06);
        }

        .info-text {
            font-size: 13px;
            color: var(--text-secondary);
            margin: 0;
            min-height: 38px; /* Fixed height for 2 lines to avoid layout shift */
        }

        /* Compact Primary Action */
        #action-btn {
            width: 100%;
            background: var(--accent);
            color: white;
            border: none;
            padding: 10px;
            border-radius: var(--radius);
            font-family: inherit;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s;
        }

        #action-btn:hover { background: #2563eb; }
        #action-btn:active { transform: scale(0.98); }
        #action-btn:disabled {
            background: #e5e7eb;
            color: #9ca3af;
            cursor: not-allowed;
        }

        .footer {
            font-size: 11px;
            color: #9ca3af;
            text-align: center;
            padding-top: 4px;
        }

        @media (prefers-reduced-motion: reduce) {
            * { transition: none !important; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <span class="title">Synapse</span>
        </header>

        <nav class="tabs" role="tablist">
            <button class="tab active" data-mode="text" role="tab" aria-selected="true">Reader</button>
            <button class="tab" data-mode="vision" role="tab" aria-selected="false">Visuals</button>
        </nav>

        <div class="content-area">
            <p class="info-text" id="mode-info">
                Simplify page content for easier reading.
            </p>
        </div>

        <button id="action-btn">
            Simplify Page
        </button>

        <footer class="footer">
            Active Globally
        </footer>
    </div>
    <script src="popup.js"></script>
</body>
</html>
